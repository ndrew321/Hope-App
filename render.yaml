services:
  - type: web
    name: withher-api
    runtime: node
    rootDir: withher/server
    buildCommand: npm install --legacy-peer-deps && npm run build && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MATCHING_SERVICE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CHECKR_API_KEY
        sync: false
      - key: CHECKR_BASE_URL
        sync: false
      - key: CHECKR_WEBHOOK_SECRET
        sync: false
